<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Myrtle Beach Megalodon</title>

    <!-- Tailwind (quick CDN for testing) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 + ReactDOM (global variables: React, ReactDOM) -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <!-- Babel so the browser can understand JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        /* Myrtle Beach Megalodon palette (from the logo) */
        --mb-navy: #0c2230; /* deep navy ring */
        --mb-gun: #0a1425; /* gunmetal bg */
        --mb-sea: #1f5a73; /* light sea blue */
        --mb-sea-2: #2e6a86; /* lighter accent */
        --mb-gold: #e9c86a; /* pale yellow */
        --mb-ink: #e6edf5; /* light text */
        --mb-muted: #9fb4c2; /* muted text */
        --mb-border: #1b3140; /* borders */
      }

      /* simple helpers */
      .theme-bg {
        background: var(--mb-gun);
        color: var(--mb-ink);
      }
      .theme-surface {
        background: rgba(15, 25, 35, 0.65);
      }
      .theme-border {
        border-color: var(--mb-border);
      }
      .theme-primary {
        background: var(--mb-sea);
        color: var(--mb-ink);
      }
      .theme-primary:hover {
        filter: brightness(1.1);
      }
      .theme-outline {
        border: 1px solid var(--mb-border);
      }
      .theme-accent {
        color: var(--mb-gold);
      }
      .btn-primary {
        background: var(--mb-gold);
        color: var(--mb-gun);
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }
      .chip {
        background: color-mix(in oklab, var(--mb-sea) 20%, transparent);
        color: #bde2f7;
        border: 1px solid color-mix(in oklab, var(--mb-sea) 40%, transparent);
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <!-- Load file  -->
    <script type="text/babel" src="./hockey_team_example.js"></script>
  </body>
</html>
