<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wacky Guy — Bendy + Two Fans</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: radial-gradient(
          1200px 700px at 50% 10%,
          #dff3ff,
          #b8e2ff 50%,
          #7bc2ff
        );
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu,
          sans-serif;
        color: #0b2a3f;
      }
      .wrap {
        display: grid;
        place-items: center;
        height: 100%;
      }
      canvas {
        width: min(1000px, 96vw);
        aspect-ratio: 16/9;
        max-height: 84vh;
        background: linear-gradient(
          #e8f7ff 0%,
          #e8f7ff 55%,
          #c9ebff 56%,
          #bbdefb 100%
        );
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      /* Sidebar HUD (left) */
      .controls {
        position: fixed;
        left: 12px;
        top: 12px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: stretch;
        width: min(300px, 40vw);
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(11, 42, 63, 0.08);
        border-radius: 14px;
        padding: 10px 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        font-size: 13px;
      }
      .card {
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 10px;
        row-gap: 6px;
        align-items: center;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.65);
      }
      .card h4 {
        grid-column: 1/-1;
        margin: 0 0 4px 0;
      }
      .card label {
        white-space: nowrap;
        font-weight: 600;
      }
      .card input[type="range"] {
        width: 100%;
        accent-color: #3b82f6;
      }
      button {
        appearance: none;
        border: 0;
        padding: 8px 12px;
        border-radius: 10px;
        background: #0b2a3f;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        width: 100%;
      }
      button:hover {
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="c" width="1280" height="720"></canvas>
    </div>

    <div class="controls">
      <div class="card">
        <h4>Left Fan</h4>
        <label>Angle</label>
        <input
          id="lAngle"
          type="range"
          min="-180"
          max="180"
          step="1"
          value="-15"
        />
        <label>Power</label>
        <input id="lPower" type="range" min="0" max="1" step="0.01" value="0" />
      </div>

      <div class="card">
        <h4>Right Fan</h4>
        <label>Angle</label>
        <input
          id="rAngle"
          type="range"
          min="-180"
          max="180"
          step="1"
          value="-165"
        />
        <label>Power</label>
        <input id="rPower" type="range" min="0" max="1" step="0.01" value="0" />
      </div>

      <button id="resetBtn">Reset</button>
    </div>

    <script>
      (() => {
        const TAU = Math.PI * 2;
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let W = canvas.width,
          H = canvas.height;

        // ---- Fans (two wind sources)
        const fans = [
          { x: W * 0.18, y: H * 0.86, angle: (-15 * Math.PI) / 180, power: 0 },
          { x: W * 0.82, y: H * 0.86, angle: (-165 * Math.PI) / 180, power: 0 },
        ];
        const lAngle = document.getElementById("lAngle"),
          lPower = document.getElementById("lPower");
        const rAngle = document.getElementById("rAngle"),
          rPower = document.getElementById("rPower");
        lAngle.addEventListener(
          "input",
          () => (fans[0].angle = (+lAngle.value * Math.PI) / 180)
        );
        rAngle.addEventListener(
          "input",
          () => (fans[1].angle = (+rAngle.value * Math.PI) / 180)
        );
        lPower.addEventListener("input", () => (fans[0].power = +lPower.value));
        rPower.addEventListener("input", () => (fans[1].power = +rPower.value));
        document.getElementById("resetBtn").addEventListener("click", resetGuy);

        // ---- Soft-body "wacky guy"
        class Point {
          constructor(x, y, p = false) {
            this.x = x;
            this.y = y;
            this.ox = x;
            this.oy = y;
            this.p = p;
          }
        }
        class Stick {
          constructor(a, b, st = 1) {
            this.a = a;
            this.b = b;
            const dx = b.x - a.x,
              dy = b.y - a.y;
            this.len = Math.hypot(dx, dy);
            this.st = st;
          }
        }
        const pts = [],
          sticks = [];
        const add = (x, y, p) => {
          const q = new Point(x, y, p);
          pts.push(q);
          return q;
        };
        const link = (a, b, st) => sticks.push(new Stick(a, b, st));

        const base = { x: W * 0.5, y: H * 0.88 };

        let spine = [],
          head,
          neck,
          sIdx,
          lSh,
          rSh,
          lE,
          rE,
          lW,
          rW,
          lH,
          rH;

        function buildGuy() {
          pts.length = 0;
          sticks.length = 0;

          // BENDY: more segments + bending (cross) constraints
          const SEG = 26,
            segLen = H * 0.022;
          const baseP = add(base.x, base.y, true);
          spine = [baseP];
          for (let i = 1; i <= SEG; i++) {
            spine.push(add(baseP.x, baseP.y - segLen * i));
            link(spine[i - 1], spine[i], 0.48);
          }
          // cross links to resist kinks but keep flowy
          for (let i = 2; i <= SEG; i++) link(spine[i - 2], spine[i], 0.22);
          for (let i = 3; i <= SEG; i++) link(spine[i - 3], spine[i], 0.12);

          neck = spine[SEG - 1];
          head = spine[SEG]; // last two points

          // LONG, FLOPPY ARMS (3 segments each)
          sIdx = Math.floor(SEG * 0.62);
          lSh = spine[sIdx];
          rSh = spine[sIdx];

          const u = segLen * 1.1,
            stArm = 0.86;
          lE = add(lSh.x - u * 1.2, lSh.y + u * 0.2);
          lW = add(lE.x - u * 1.2, lE.y + u * 0.15);
          lH = add(lW.x - u * 1.2, lW.y + u * 0.1);

          rE = add(rSh.x + u * 1.2, rSh.y + u * 0.2);
          rW = add(rE.x + u * 1.2, rE.y + u * 0.15);
          rH = add(rW.x + u * 1.2, rW.y + u * 0.1);

          link(lSh, lE, stArm);
          link(lE, lW, stArm);
          link(lW, lH, stArm);
          link(rSh, rE, stArm);
          link(rE, rW, stArm);
          link(rW, rH, stArm);
        }
        function resetGuy() {
          buildGuy();
        }
        buildGuy();

        // ---- Physics (only wind moves it)
        const DAMP = 0.996;
        const AIR_COEFF = 0.08; // strong
        const FALLOFF = 560; // wind reaches far
        const EXP = 1.45; // gentle falloff
        const ARM_SIDE_PAD = 8; // keep arms on their visible side

        function step(dt) {
          // integrate all points
          for (const p of pts) {
            if (p.p) {
              p.ox = p.x;
              p.oy = p.y;
              continue;
            }

            let vx = (p.x - p.ox) * DAMP;
            let vy = (p.y - p.oy) * DAMP;

            // accumulate wind from both fans (power curve + distance falloff)
            let ax = 0,
              ay = 0;
            for (const f of fans) {
              const fx = Math.cos(f.angle),
                fy = Math.sin(f.angle);
              const dx = p.x - f.x,
                dy = p.y - f.y;
              const dist = Math.hypot(dx, dy);
              const atten =
                Math.pow(Math.max(0, f.power), 1.15) /
                Math.pow(1 + dist / FALLOFF, EXP);
              ax += fx * atten;
              ay += fy * atten;
            }
            const k = AIR_COEFF * (dt * 1000);
            vx += ax * k;
            vy += ay * k;

            p.ox = p.x;
            p.oy = p.y;
            p.x += vx;
            p.y += vy;
          }

          // satisfy constraints (distance + simple "arm stays in front" half-plane)
          for (let it = 0; it < 16; it++) {
            for (const s of sticks) {
              const ax = s.a.x,
                ay = s.a.y,
                bx = s.b.x,
                by = s.b.y;
              let dx = bx - ax,
                dy = by - ay,
                d = Math.hypot(dx, dy) || 0.0001;
              const diff = (d - s.len) / d,
                inv = 0.5 * s.st,
                ox = dx * diff * inv,
                oy = dy * diff * inv;
              if (!s.a.p) {
                s.a.x += ox;
                s.a.y += oy;
              }
              if (!s.b.p) {
                s.b.x -= ox;
                s.b.y -= oy;
              }
            }

            // keep arms on their side of the body so they don't "disappear"
            const lx = lSh.x - ARM_SIDE_PAD,
              rx = rSh.x + ARM_SIDE_PAD;
            for (const p of [lE, lW, lH]) if (p.x > lx) p.x = lx;
            for (const p of [rE, rW, rH]) if (p.x < rx) p.x = rx;

            // bounds
            for (const p of pts) {
              if (p.p) continue;
              if (p.x < 10) p.x = 10;
              else if (p.x > W - 10) p.x = W - 10;
              if (p.y < 10) p.y = 10;
              else if (p.y > H - 10) p.y = H - 10;
            }
          }
        }

        // ---- Drawing
        function draw() {
          ctx.clearRect(0, 0, W, H);

          // fans + wind streaks
          for (const f of fans) {
            ctx.save();
            ctx.translate(f.x, f.y);
            ctx.rotate(f.angle);
            ctx.fillStyle = "#0b2a3f";
            ctx.beginPath();
            ctx.ellipse(0, 0, 36, 26, 0, 0, TAU);
            ctx.fill();
            ctx.fillStyle = "#1e4770";
            ctx.fillRect(26, -10, 44, 20);
            ctx.fillStyle = "rgba(11,42,63,.9)";
            ctx.beginPath();
            ctx.moveTo(60, 0);
            ctx.lineTo(98, -9);
            ctx.lineTo(98, 9);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            const dirx = Math.cos(f.angle),
              diry = Math.sin(f.angle);
            const streaks = Math.round(10 + f.power * 18);
            for (let i = 0; i < streaks; i++) {
              const t = (performance.now() / 1000 + i * 0.1) % 1;
              const px = f.x + dirx * (30 + t * W * 0.8);
              const py = f.y + diry * (30 + t * H * 0.8);
              ctx.globalAlpha = 0.11 * (1 - t) * (0.6 + 0.4 * f.power);
              ctx.lineWidth = 5 + 8 * (1 - t);
              ctx.strokeStyle = "#0b2a3f";
              ctx.lineCap = "round";
              ctx.beginPath();
              ctx.moveTo(px - dirx * 55, py - diry * 55);
              ctx.lineTo(px + dirx * 90, py + diry * 90);
              ctx.stroke();
              ctx.globalAlpha = 1;
            }
          }

          // body spine (draw first) …
          ctx.strokeStyle = "#0b83ff";
          ctx.lineWidth = 40;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(spine[0].x, spine[0].y);
          for (let i = 1; i < spine.length; i++)
            ctx.lineTo(spine[i].x, spine[i].y);
          ctx.stroke();

          // …arms on top so they never hide
          ctx.lineWidth = 24;
          ctx.beginPath();
          ctx.moveTo(lSh.x, lSh.y);
          ctx.lineTo(lE.x, lE.y);
          ctx.lineTo(lW.x, lW.y);
          ctx.lineTo(lH.x, lH.y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(rSh.x, rSh.y);
          ctx.lineTo(rE.x, rE.y);
          ctx.lineTo(rW.x, rW.y);
          ctx.lineTo(rH.x, rH.y);
          ctx.stroke();

          // head
          const neck = spine[spine.length - 2];
          ctx.save();
          ctx.translate(head.x, head.y);
          ctx.rotate(Math.atan2(head.y - neck.y, head.x - neck.x));
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.ellipse(0, 0, 16, 12, 0, 0, TAU);
          ctx.fill();
          ctx.fillStyle = "#0b2a3f";
          ctx.beginPath();
          ctx.arc(-5, -2, 2.8, 0, TAU);
          ctx.arc(5, -2, 2.8, 0, TAU);
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = "#0b2a3f";
          ctx.beginPath();
          ctx.arc(0, 4, 6, 0, Math.PI);
          ctx.stroke();
          ctx.restore();
        }

        // ---- Loop
        let last = performance.now();
        function frame(t) {
          const dt = Math.min(1 / 30, (t - last) / 1000);
          last = t;
          step(dt);
          draw();
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        // Resize (keep internal canvas size)
        window.addEventListener("resize", () => {
          W = canvas.width = 1280;
          H = canvas.height = 720;
          base.x = W * 0.5;
          base.y = H * 0.88;
          fans[0].x = W * 0.18;
          fans[0].y = H * 0.86;
          fans[1].x = W * 0.82;
          fans[1].y = H * 0.86;
          resetGuy();
        });
      })();
    </script>
  </body>
</html>
